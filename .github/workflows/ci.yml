name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build both add-on variants
        run: ./scripts/build-mcaddon.sh

      - name: Validate Ultimate Chaos pack
        run: python3 variants/ultimate-chaos-pack/scripts/validate_pack.py

      - name: Upload distributables
        uses: actions/upload-artifact@v4
        with:
          name: brindal-grayson-cow-pack
          path: |
            dist/custom-cows.mcaddon
            dist/ultimate-chaos.mcaddon
            dist/ultimate-chaos.mcpack
          retention-days: 30
